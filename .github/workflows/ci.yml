name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: justorder_test
          POSTGRES_USER: justorder
          POSTGRES_PASSWORD: justorder
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U justorder -d justorder_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 temurin
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests (PostgreSQL)
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/justorder_test
          SPRING_DATASOURCE_USERNAME: justorder
          SPRING_DATASOURCE_PASSWORD: justorder
        run: mvn -B clean test

  frontend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: justorder_test
          POSTGRES_USER: justorder
          POSTGRES_PASSWORD: justorder
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U justorder -d justorder_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 temurin
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Start backend service for frontend integration tests
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/justorder_test
          DB_USER: justorder
          DB_PASSWORD: justorder
        run: |
          nohup ./mvnw -B -DskipTests spring-boot:run > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/api/restaurants/search >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          cat /tmp/backend.log || true
          exit 1

      - name: Run frontend tests
        working-directory: frontend
        run: CI=true npm test -- --watchAll=false

      - name: Stop backend service
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi
